<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{NOMBRE}} | Catálogo</title>

<meta name="description" content="{{DESCRIPCION}}">

<meta property="og:title" content="{{NOMBRE}}">
<meta property="og:description" content="{{DESCRIPCION}}">
<meta property="og:image" content="{{IMAGENOG}}">
<meta property="og:type" content="product">
<meta property="og:url" content="{{URL}}">

<link rel="stylesheet" href="/tienda/css/style.css">
<link rel="stylesheet" href="/tienda/css/producto.css">

</head>


<body>

<div class="producto-container">

<img 
src="{{IMAGEN}}" 
class="producto-img" 
alt="{{NOMBRE}}"
loading="lazy"
>

<h1 class="producto-titulo">
{{NOMBRE}}
</h1>

<p class="producto-desc">
{{DESCRIPCION}}
</p>

<div class="producto-precio">
$ {{PRECIO}}
</div>

<div class="producto-botones">

<a 
class="btn-comprar"
href="{{WHATSAPP}}"
target="_blank"
rel="noopener"
>
Comprar por WhatsApp
</a>

<button 
class="btn-volver"
onclick="volverCatalogo()"
>
← Volver al catálogo
</button>

</div>

</div>

<script>

function volverCatalogo(){

if(document.referrer && document.referrer.includes("catalogo")){
history.back();
return;
}

window.location.href="/tienda/catalogo.html";

}

</script>

</body>
</html>
